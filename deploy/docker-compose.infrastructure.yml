services:
  postgres:
    image: postgres:16
    container_name: smartpark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smartpark-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: smartpark-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - smartpark-redis-data:/data

volumes:
  smartpark-postgres-data:
  smartpark-redis-data:
